{% extends 'base.html' %}
{% load static %}

{% block title %}Login - HomeMarket{% endblock %}

{% block content %}
<div class="flex min-h-screen bg-white">
    <!-- Left Side: Image & Logo -->
    <div class="hidden lg:flex w-1/2 relative bg-tertiary">
        <img src="{% static 'images/auth_login_side.webp' %}" alt="Login" class="absolute inset-0 w-full h-full object-cover opacity-80">
        <div class="absolute inset-0 bg-blue-950/40"></div>
        <div class="absolute top-8 left-8 z-10">
             <img src="{% static 'images/logo/logo.webp' %}" alt="HomeMarket Logo" class="h-12 w-auto bg-white/80 rounded-lg p-2">
        </div>
        <div class="relative z-10 flex flex-col justify-end p-12 text-white">
            <h2 class="text-4xl font-bold mb-4 font-lato">Welcome Back</h2>
            <p class="text-lg text-gray-100">Sign in to continue your journey.</p>
        </div>
    </div>

    <!-- Right Side: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-16">
        <div class="custom-form w-full max-w-md">
            
             <!-- Mobile Logo -->
             <div class="lg:hidden flex justify-center mb-8">
                <img src="{% static 'images/logo/logo.webp' %}" alt="Logo" class="h-12 bg-gray-50 p-1 rounded">
            </div>

            <h2 class="text-3xl font-bold text-tertiary mb-2 font-lato">Login</h2>
            <p class="text-gray-500 mb-8">Welcome back! Please enter your details.</p>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-5">
                    <label for="email" class="custom-label">Email Address</label>
                    <input type="email" name="email" id="email" class="custom-input" placeholder="name@example.com" required>
                </div>

                <div class="mb-6">
                    <label for="password" class="custom-label">Password</label>
                    <input type="password" name="password" id="password" class="custom-input" placeholder="••••••••" required>
                </div>
                
                 <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-primary hover:text-blue-900">Forgot password?</a>
                    </div>
                </div>


                <button type="submit" class="custom-btn">Sign In</button>
            </form>

            <p class="mt-8 text-sm text-center text-gray-500">
                Don't have an account? <a href="{% url 'register' %}" class="font-semibold text-primary hover:underline">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
