{% extends 'base.html' %}
{% load static %}

{% block title %}Verify Email - HomeMarket{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center bg-gray-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden relative">
        <div class="absolute top-0 w-full h-2 bg-primary"></div>
        <div class="p-8 text-center">
            
            <img src="{% static 'images/logo/logo.webp' %}" alt="Logo" class="h-16 mx-auto mb-6">
            
            <h2 class="text-2xl font-bold text-tertiary mb-2 font-lato">Verify Your Email</h2>
            <p class="text-gray-500 mb-8 text-sm">We've sent a verification code to your email. Please enter it below.</p>

            <form method="POST" action="{% url 'verify_otp' %}">
                {% csrf_token %}
                
                <div class="mb-6">
                    <label for="code" class="text-sm font-medium text-gray-700 sr-only">Verification Code</label>
                    <input type="text" name="code" id="code" class="custom-input text-center text-2xl tracking-widest" placeholder="123456" maxlength="6" required autofocus>
                </div>

                <button type="submit" class="custom-btn">Verify Account</button>
            </form>
            
             <p class="mt-6 text-sm text-gray-400">
                Didn't receive the code? <a href="#" class="text-primary hover:underline">Resend</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
